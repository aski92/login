<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./src/output.css">
</head>

<body class="bg-purple-300 min-h-screen p-6 flex justify-center items-center">

    <div class="flex  bg-white rounded-2xl overflow-hidden max-w-4xl w-full">
        <div
            class="bg-[url(/src/assets/images/space.jpg)] hidden md:flex md:w-1/2 opacity-90 bg-cover">

            <div class="flex flex-col justify-center items-center h-full p-6 text-center gap-4">
                <h1 class="text-4xl font-bold text-white">Welcome</h1>
                <p class="text-sm text-white">Lorem ipsum dolor sit amet consectetur, adipisicing elit. Ipsa eveniet mollitia ut, soluta ipsam
                    blanditiis quisquam totam,</p>
            </div>
        </div>

        <div class=" p-6 w-full flex flex-col gap-4 md:w-1/2">
            <h1 class="font-bold text-2xl">Register</h1>
            <p class="text-sm">Create your account. it's free and only takes a minute</p>
            <div class="flex flex-col gap-4">
                <div class="flex gap-4">
                    <input type="text" placeholder="First Name" class="w-1/2 border p-2 text-sm rounded-sm">
                    <input type="text" placeholder="Last Name" class="w-1/2 border p-2 text-sm rounded-sm">
                </div>
                <input type="text" placeholder="Email" class="border p-2 text-sm rounded-sm">
                <input type="text" placeholder="Password" class="border p-2 text-sm rounded-sm">
                <input type="text" placeholder="Confirm Password" class="border p-2 text-sm rounded-sm">

                <div class="flex gap-2 items-center">
                    <input type="checkbox">
                    <p class="text-sm">I accept the <span class="text-purple-400">Terms of use</span> &  <span class="text-purple-400">Privacy Policy</span></p>
                </div>

                <button class="bg-purple-500 text-white text-sm font-bold p-4 rounded">Register Now</button>
            </div>
        </div>

    </div>  

</body>

</html>
